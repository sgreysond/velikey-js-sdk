name: Release (npm)

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish to npm (requires NPM_TOKEN)"
        required: true
        default: "false"
        type: choice
        options: ["false", "true"]

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
      - run: npm test --silent
      - run: npm run build --if-present
      - name: Publish (guarded)
        if: ${{ inputs.publish == 'true' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "${NODE_AUTH_TOKEN}" ]; then echo "NPM_TOKEN missing, aborting"; exit 1; fi
          npm publish --access public
      - name: Dry-run artifact
        if: ${{ inputs.publish != 'true' }}
        run: |
          mkdir -p dist-artifacts && cp -r dist/* dist-artifacts/ 2>/dev/null || true
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        if: ${{ inputs.publish != 'true' }}
        with:
          name: npm-dist
          path: dist-artifacts/**

