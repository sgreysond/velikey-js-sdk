name: Release (npm)

# Manual-dispatch release path. Publishes via npm Trusted Publisher
# (OIDC) — no NPM_TOKEN is required. See publish.yml for the full
# explanation; both workflows are registered as trusted publishers
# on the @velikey/sdk package.

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish to npm (OIDC + provenance — no token needed)"
        required: true
        default: "false"
        type: choice
        options: ["false", "true"]

permissions:
  contents: read
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
      - run: npm test --silent
      - run: npm run build --if-present

      # Bump npm to >= 11.15.0 so `npm stage publish` is available.
      - name: Bump npm CLI for staged publishing
        if: ${{ inputs.publish == 'true' }}
        run: npm install -g npm@latest

      # Stage-only OIDC publish: uploads to staging queue, requires
      # a maintainer to approve via 2FA before reaching npm users.
      # See publish.yml for the full explanation.
      - name: Stage publish (OIDC + provenance + 2FA gate)
        if: ${{ inputs.publish == 'true' }}
        run: npm stage publish --access public --provenance
      - name: Dry-run artifact
        if: ${{ inputs.publish != 'true' }}
        run: |
          mkdir -p dist-artifacts && cp -r dist/* dist-artifacts/ 2>/dev/null || true
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        if: ${{ inputs.publish != 'true' }}
        with:
          name: npm-dist
          path: dist-artifacts/**

