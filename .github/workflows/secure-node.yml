name: Security - Node Install Guard

# Audit every package.json in the repo for:
#   - lifecycle hooks (preinstall, install, postinstall, prepare) that
#     could run arbitrary code at install time.
#   - network calls (curl, wget, http(s) URLs) embedded in npm scripts.
#
# Previously the inline `node -e '...'` had `\\s` and `\\/` in the
# detection regex. With single-quoted shell + YAML block scalar, those
# made it to node as literal `\\s` / `\\/`. JS regex parses `\\` as one
# literal backslash, so the regex became:
#
#   /(curl\\s|wget\\s|https?:\\/\\/)/i
#
# which JS lexes as TWO regexes, the first one closing at the
# `\\/` (backslash + slash → end-of-regex), and the second one's
# trailing chars triggered "Invalid regular expression flags". The
# script crashed before doing any work, failing the workflow.
#
# Rewritten using indexOf checks (no regex) for clarity + immunity to
# escaping. Same semantics.

on:
  schedule:
    - cron: '0 5 * * 1'
  workflow_dispatch:
  push:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  guard:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Scan Node projects (ignore scripts, block lifecycle hooks)
        shell: bash
        run: |
          set -euo pipefail
          mapfile -d '' PKGS < <(find . -path './**/node_modules' -prune -o -name package.json -print0)
          if [ ${#PKGS[@]} -eq 0 ]; then echo "No package.json found"; exit 0; fi
          for pkg in "${PKGS[@]}"; do
            dir=$(dirname "$pkg")
            echo "::group::Scanning $dir"
            cd "$dir"
            if [ -f package-lock.json ]; then
              npm ci --ignore-scripts || true
            else
              npm i --ignore-scripts --package-lock-only || true
              npm ci --ignore-scripts || true
            fi
            node "${GITHUB_WORKSPACE}/.github/scripts/check-npm-scripts.js" || exit 1
            npm audit --omit=dev || true
            cd - >/dev/null
            echo "::endgroup::"
          done
