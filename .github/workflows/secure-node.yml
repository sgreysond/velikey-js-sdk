name: Security - Node Install Guard

on:
  push:
  pull_request:

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Scan Node projects (ignore scripts, block lifecycle hooks)
        shell: bash
        run: |
          set -euo pipefail
          mapfile -d '' PKGS < <(find . -path './**/node_modules' -prune -o -name package.json -print0)
          if [ ${#PKGS[@]} -eq 0 ]; then echo "No package.json found"; exit 0; fi
          for pkg in "${PKGS[@]}"; do
            dir=$(dirname "$pkg")
            echo "::group::Scanning $dir"
            cd "$dir"
            if [ -f package-lock.json ]; then
              npm ci --ignore-scripts || true
            else
              npm i --ignore-scripts --package-lock-only || true
              npm ci --ignore-scripts || true
            fi
            node -e 'const fs=require("fs");const pkg=JSON.parse(fs.readFileSync("package.json","utf8"));const s=pkg.scripts||{};const bad=["preinstall","install","postinstall","prepare"].filter(k=>s[k]); if(bad.length){console.error("Blocked lifecycle scripts in", process.cwd(), ":", bad.join(",")); process.exit(1)}; const vals=Object.values(s).join(" || "); if(/(curl\\s|wget\\s|https?:\\/\\/)/i.test(vals)){console.error("Blocked network calls in npm scripts in", process.cwd()); process.exit(1)}; console.log("No dangerous lifecycle or network calls in npm scripts.")' || exit 1
            npm audit --omit=dev || true
            cd - >/dev/null
            echo "::endgroup::"
          done
